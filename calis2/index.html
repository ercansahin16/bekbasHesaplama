<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çalış 2 - Adet Hesaplama</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../app.js"></script>
</head>
<body class="dark">
  <button class="theme-toggle" onclick="toggleTheme()">🌓 Tema</button>
  <div class="cikis-simgesi" onclick="window.location.href='../index.html'">
    <img src="../cikis.png" alt="Çıkış" width="50" height="25">
  </div>
    <!-- Aynı header logo -->
  <div class="header-logo">
    <img src="../bekbas.png" alt="Bekbaş Logo" class="logo" />
    <div class="header-text">
      <div class="alt-baslik">Bekbaş Gıda San. Tic.Aş.</div>
    </div>
  </div>

  <div class="card-container" style="max-width: 500px;">
    <div class="card">
      <h2>ÇALIŞ 2 - Adet Hesaplama</h2>
      <input type="number" id="taneGram" placeholder="Tane Gramajı (gr)">
      <input type="number" id="koliAdedi" placeholder="Kolideki Adet" >
      <input type="number" id="toplamKg" placeholder="Toplam Miktar (kg)">
      <input type="number" id="birimFiyat" step="0.0001" placeholder="KG Fiyatı (KDV hariç)">
      <input type="number" id="kdvOrani" placeholder="KDV Oranı (%)" >
      <button onclick="hesapla()">Hesapla</button>
      <button class="temizle" onclick="temizle()">Temizle</button>
      <div class="result" id="sonuc"></div>
    </div>
  </div>

  <script>
    function hesapla() {
      const g = +document.getElementById('taneGram').value;
      const koli = +document.getElementById('koliAdedi').value;
      const tKg = +document.getElementById('toplamKg').value;
      const fiyat = +document.getElementById('birimFiyat').value;
      const kdv = +document.getElementById('kdvOrani').value;
      if ([g, koli, tKg, fiyat, kdv].some(isNaN)) {
        document.getElementById('sonuc').innerText = "Eksik değer!";
        return;
      }
      const toplamAdet = Math.round(tKg / (g / 1000));
      const adetFiyatKDVsiz = (fiyat * (g / 1000)).toFixed(2);
      const adetFiyatKDVli = (adetFiyatKDVsiz * (1 + kdv / 100)).toFixed(2);
      document.getElementById('sonuc').innerText =
        `Adet: ${toplamAdet}\nKDV Hariç: ${adetFiyatKDVsiz} TL\nKDV Dahil: ${adetFiyatKDVli} TL`;
    }
    function temizle() {
      document.querySelectorAll('input').forEach(i => i.value = '');
      document.getElementById('sonuc').innerText = '';
    }
  </script>
</body>
</html>
