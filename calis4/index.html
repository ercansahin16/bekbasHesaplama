<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çalış 4 - Ağırlıklı Ortalama</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../app.js"></script>

</head>
<body class="dark">
  <button class="theme-toggle" onclick="toggleTheme()">🌓 Tema</button>
  <div class="cikis-simgesi" onclick="window.location.href='../index.html'" title="Ana Sayfa">
    <img src="../cikis.png" alt="Çıkış" width="50" height="25">
  </div>

  <!-- Aynı header logo -->
  <div class="header-logo">
    <img src="../bekbas.png" alt="Bekbaş Logo" class="logo" />
    <div class="header-text">
      <div class="alt-baslik">Bekbaş Gıda San. Tic.Aş.</div>
    </div>
  </div>

  <div class="card-container" style="max-width: 500px;">
    <div class="card" >
      <h2>ÇALIŞ 4 - Ağırlık Bazlı Ortalama Fiyat</h2>
      <input type="number" id="kg1" placeholder="1. Miktar (kg)" >
      <input type="number" id="fiyat1" step="0.0001" placeholder="1. Fiyat (TL/kg)" >
      <input type="number" id="kg2" placeholder="2. Miktar (kg)" >
      <input type="number" id="fiyat2" step="0.0001" placeholder="2. Fiyat (TL/kg)" >
      <button onclick="hesapla()">Hesapla</button>
      <button class="temizle" onclick="temizle()">Temizle</button>
      <div class="result" id="sonuc"></div>
    </div>
  </div>

  <script>
    function hesapla() {
      const kg1 = parseFloat(document.getElementById('kg1').value);
      const f1 = parseFloat(document.getElementById('fiyat1').value);
      const kg2 = parseFloat(document.getElementById('kg2').value);
      const f2 = parseFloat(document.getElementById('fiyat2').value);
      if ([kg1, f1, kg2, f2].some(isNaN)) {
        document.getElementById('sonuc').innerText = "Lütfen tüm alanları doldurun.";
        return;
      }
      const toplamKg = kg1 + kg2;
      const toplamTutar = kg1 * f1 + kg2 * f2;
      const ortalama = (toplamTutar / toplamKg).toFixed(2);
      document.getElementById('sonuc').innerText = `Ağırlıklı Ortalama Fiyat: ${ortalama} TL/kg`;
    }
    function temizle() {
      document.querySelectorAll('input').forEach(i => i.value = '');
      document.getElementById('sonuc').innerText = '';
    }
  </script>
</body>
</html>
