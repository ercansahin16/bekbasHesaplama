<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çalış 3 - KG Hesaplama</title>
  <link rel="stylesheet" href="../style.css">
  <script src="../app.js"></script>
</head>
<body class="dark">
  <button class="theme-toggle" onclick="toggleTheme()">🌓 Tema</button>
  <div class="cikis-simgesi" onclick="window.location.href='../index.html'">
    <img src="../cikis.png" alt="Çıkış" width="50" height="25">
  </div>
   <!-- Aynı header logo -->
  <div class="header-logo">
    <img src="../bekbas.png" alt="Bekbaş Logo" class="logo" />
    <div class="header-text">
      <div class="alt-baslik">Bekbaş Gıda San. Tic.Aş.</div>
    </div>
  </div>

  <div class="card-container" style="max-width: 500px;">
    <div class="card">
      <h2>ÇALIŞ 3 - KG Hesaplama</h2>
      <input type="number" id="adet" placeholder="Toplam Adet">
      <input type="number" id="gramaj" placeholder="Adet Gramajı (gr)">
      <input type="number" id="birimFiyat" step="0.0001" placeholder="Birim Fiyat (KDV hariç)">
      <input type="number" id="kdv" placeholder="KDV Oranı (%)" >
      <button onclick="hesapla()">Hesapla</button>
      <button class="temizle" onclick="temizle()">Temizle</button>
      <div class="result" id="sonuc"></div>
    </div>
  </div>

  <script>
    function hesapla() {
      const adet = +document.getElementById('adet').value;
      const gram = +document.getElementById('gramaj').value;
      const fiyat = +document.getElementById('birimFiyat').value;
      const kdv = +document.getElementById('kdv').value;
      if ([adet, gram, fiyat, kdv].some(isNaN)) {
        document.getElementById('sonuc').innerText = "Eksik değer!";
        return;
      }
      const toplamKg = (adet * gram) / 1000;
      const kgFiyat = (fiyat / (gram / 1000)).toFixed(2);
      const kgFiyatKDV = (kgFiyat * (1 + kdv / 100)).toFixed(2);
      document.getElementById('sonuc').innerText =
        `Toplam: ${toplamKg.toLocaleString()} kg\nKG Hariç: ${kgFiyat} TL\nKG Dahil: ${kgFiyatKDV} TL`;
    }
    function temizle() {
      document.querySelectorAll('input').forEach(i => i.value = '');
      document.getElementById('sonuc').innerText = '';
    }
  </script>
</body>
</html>
